<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTFO Vero Countdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a4d2e 0%, #2d6a4f 50%, #52b788 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* Subtle golf ball pattern background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 2px, transparent 3px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.04) 2px, transparent 3px),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04) 2px, transparent 3px),
      radial-gradient(circle at 85% 20%, rgba(255,255,255,0.04) 2px, transparent 3px);
    background-size: 200px 200px;
    pointer-events: none;
  }

  .container {
    text-align: center;
    color: white;
    max-width: 700px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .flag {
    font-size: 3.5rem;
    margin-bottom: 0.5rem;
    display: inline-block;
    animation: wave 3s ease-in-out infinite;
    transform-origin: bottom left;
  }

  @keyframes wave {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-style: italic;
    opacity: 0.9;
    margin-bottom: 3rem;
    letter-spacing: 1px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .time-block {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 1.5rem 0.5rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  .time-value {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: bold;
    font-family: 'Courier New', monospace;
    line-height: 1;
    margin-bottom: 0.5rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .time-label {
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.85;
  }

  .target-info {
    background: rgba(0, 0, 0, 0.2);
    padding: 1rem 1.5rem;
    border-radius: 12px;
    display: inline-block;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .target-info strong {
    display: block;
    margin-bottom: 0.25rem;
    font-size: 1.1em;
  }

  .footer-quote {
    margin-top: 2rem;
    font-style: italic;
    opacity: 0.7;
    font-size: 0.95rem;
  }

  .arrived {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: bold;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.85; }
  }

  @media (max-width: 480px) {
    .countdown { gap: 0.5rem; }
    .time-block { padding: 1rem 0.25rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="flag">⛳</div>
    <h1>GTFO VERO</h1>
    <p class="subtitle">The boys are getting out of town...</p>

    <div id="countdown" class="countdown">
      <div class="time-block">
        <div class="time-value" id="days">--</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-block">
        <div class="time-value" id="hours">--</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-block">
        <div class="time-value" id="minutes">--</div>
        <div class="time-label">Minutes</div>
      </div>
      <div class="time-block">
        <div class="time-value" id="seconds">--</div>
        <div class="time-label">Seconds</div>
      </div>
    </div>

    <div class="target-info">
      <strong>Sunday, May 17, 2026</strong>
      9:00 AM Eastern Time
    </div>

    <p class="footer-quote">"Drive for show, putt for dough." 🏌️</p>
  </div>

<script>
  // Target: May 17, 2026 at 9:00 AM Eastern Time
  // Using EDT (UTC-4) since May is during Daylight Saving Time
  const target = new Date('2026-05-17T09:00:00-04:00').getTime();

  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const countdownEl = document.getElementById('countdown');

  function pad(n) { return String(n).padStart(2, '0'); }

  function update() {
    const now = Date.now();
    const diff = target - now;

    if (diff <= 0) {
      countdownEl.innerHTML = '<div class="arrived" style="grid-column: 1 / -1;">🏌️ GTFO VERO! 🏌️</div>';
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    daysEl.textContent = days;
    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
